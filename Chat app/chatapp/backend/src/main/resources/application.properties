server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./data/chatappdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=Bharath@2002
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
app.redis.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.cache.type=simple
spring.cache.redis.time-to-live=600000

# JWT Configuration
app.jwt.secret=chatapp-super-secret-key-that-is-long-enough-for-HS512-algorithm-minimum-512-bits
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# WebSocket Configuration
app.websocket.allowed-origins=http://localhost:*,http://127.0.0.1:*

# CORS
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

# Logging
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.web.socket=DEBUG

# Multipart (file upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
