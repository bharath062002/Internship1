version: '3.8'

services:
  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatapp-net

  # ── MySQL ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: chatapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: chatappdb
      MYSQL_USER: chatapp
      MYSQL_PASSWORD: chatapppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chatapp-net

  # ── Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatapp-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatappdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: chatapp
      SPRING_DATASOURCE_PASSWORD: chatapppassword
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: chatapp-super-secret-key-that-is-long-enough-for-HS512-algorithm-minimum-512-bits
      APP_JWT_EXPIRATION: 86400000
      APP_JWT_REFRESH_EXPIRATION: 604800000
      APP_WEBSOCKET_ALLOWED_ORIGINS: http://localhost:3000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - chatapp-net

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - chatapp-net

volumes:
  redis_data:
  mysql_data:

networks:
  chatapp-net:
    driver: bridge
