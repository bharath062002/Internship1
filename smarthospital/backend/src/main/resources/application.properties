server.port=8080
spring.application.name=smarthospital

# H2 In-Memory DB (for development/demo)
spring.datasource.url=jdbc:h2:mem:smarthospitaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=Bharath@2002
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Configuration (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/smarthospital?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=Bharath@2002
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=SmartHospitalSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# Mail (simulated)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=smarthospital@demo.com
spring.mail.password=demopassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Pagination defaults
app.pagination.default-page-size=10
app.pagination.max-page-size=50
