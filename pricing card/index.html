<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Cards</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 30px;
    }

    .card {
      background: white;
      padding: 30px;
      width: 250px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);

      /* Animation */
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    /* Hover effect */
    .card:hover {
      transform: translateY(-15px) scale(1.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .price {
      font-size: 40px;
      margin: 20px 0;
      color: #333;
    }

    .features {
      list-style: none;
      padding: 0;
      margin: 20px 0;
    }

    .features li {
      margin: 10px 0;
      color: #555;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background: #5a67d8;
    }

    /* Highlighted Card */
    .highlight {
      background: #667eea;
      color: white;
      transform: scale(1.1);
    }

    .highlight .price,
    .highlight .features li {
      color: white;
    }

    .highlight .btn {
      background: white;
      color: #667eea;
    }

    .highlight .btn:hover {
      background: #ddd;
    }
  </style>

</head>
<body>

<div class="container">

  <!-- Basic Plan -->
  <div class="card">
    <div class="title">Basic</div>
    <div class="price">$9</div>
    <ul class="features">
      <li>1 User</li>
      <li>5GB Storage</li>
      <li>Email Support</li>
    </ul>
    <button class="btn">Choose Plan</button>
  </div>

  <!-- Standard Plan (Highlighted) -->
  <div class="card highlight">
    <div class="title">Standard</div>
    <div class="price">$19</div>
    <ul class="features">
      <li>5 Users</li>
      <li>50GB Storage</li>
      <li>Priority Support</li>
    </ul>
    <button class="btn">Choose Plan</button>
  </div>

  <!-- Premium Plan -->
  <div class="card">
    <div class="title">Premium</div>
    <div class="price">$29</div>
    <ul class="features">
      <li>Unlimited Users</li>
      <li>200GB Storage</li>
      <li>24/7 Support</li>
    </ul>
    <button class="btn">Choose Plan</button>
  </div>

</div>

</body>
</html>
