<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="grain"></div>

  <header>
    <div class="logo">₹ XPENSE</div>
    <div class="header-meta">
      <span id="current-month"></span>
      <button class="export-btn" onclick="exportCSV()">↓ Export CSV</button>
    </div>
  </header>

  <main>
    <!-- Summary Cards -->
    <section class="summary-grid">
      <div class="card card--income">
        <div class="card-label">Total Income</div>
        <div class="card-amount" id="total-income">₹0.00</div>
        <div class="card-bar"><div class="bar-fill bar-fill--income" id="income-bar"></div></div>
      </div>
      <div class="card card--expense">
        <div class="card-label">Total Expenses</div>
        <div class="card-amount" id="total-expense">₹0.00</div>
        <div class="card-bar"><div class="bar-fill bar-fill--expense" id="expense-bar"></div></div>
      </div>
      <div class="card card--balance">
        <div class="card-label">Net Balance</div>
        <div class="card-amount" id="net-balance">₹0.00</div>
        <div class="balance-status" id="balance-status">All good</div>
      </div>
    </section>

    <!-- Add Transaction -->
    <section class="add-section">
      <h2 class="section-title">+ New Transaction</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="desc" placeholder="e.g. Groceries, Salary…" />
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="Food">🍛 Food</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Shopping">🛍 Shopping</option>
            <option value="Bills">💡 Bills</option>
            <option value="Health">💊 Health</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Salary">💼 Salary</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date"/>
        </div>
        <div class="form-group type-toggle">
          <label>Type</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="btn-expense" onclick="setType('expense')">Expense</button>
            <button class="toggle-btn" id="btn-income" onclick="setType('income')">Income</button>
          </div>
        </div>
        <div class="form-group form-submit">
          <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
        </div>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </section>

    <!-- Filters & List -->
    <section class="list-section">
      <div class="list-header">
        <h2 class="section-title">Transactions</h2>
        <div class="filters">
          <select id="filter-type" onchange="renderList()">
            <option value="all">All Types</option>
            <option value="expense">Expenses</option>
            <option value="income">Income</option>
          </select>
          <select id="filter-cat" onchange="renderList()">
            <option value="all">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Salary">Salary</option>
            <option value="Other">Other</option>
          </select>
          <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>
      </div>

      <div id="transaction-list" class="transaction-list">
        <div class="empty-state">No transactions yet. Add one above!</div>
      </div>
    </section>

    <!-- Category Breakdown -->
    <section class="breakdown-section">
      <h2 class="section-title">Category Breakdown</h2>
      <div id="breakdown-list" class="breakdown-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
